# .claude/templates/dir-mode-post-merge.yml
# Source-of-truth for the hook-enforced post-merge dir-mode workflow.
# Installed into target repos at .github/workflows/dir-mode-post-merge.yml
# by scripts/setup_project.sh (future work) or /onboard.
#
# Purpose (SPEC §5.7, §5.15; Directive #61, #335):
#   When a PR merges, resolve the parent Directive of its closing Issues via the
#   sourced helper resolve_parent_directive.sh (label-aware climb to the first
#   `directive`-labelled ancestor — depth-cap 2, cycle guard, fail-soft).
#   If one resolves, post a single hook-enforced reflection comment on the parent
#   Directive Issue. The comment is the canonical audit surface for events
#   the Action emits — it doubles as the `directive-exec-count` and
#   `directive-reflect` audit records that /ship step 10.5 and /reflect
#   produce when Claude is in the loop.
#
# Idempotency: scans existing comments on the parent Directive for the
# merged PR's URL. If found, exits 0 with a no-op.
#
# Defense in depth: the Markdown procedures in .claude/commands/ship.md
# step 10.5 and .claude/commands/reflect.md remain valid for Claude-in-loop
# execution. This workflow's URL check (above) prevents IT from double-posting;
# /reflect dedupes on the reflect-stub/reflect-enriched content markers and
# enriches this stub in place rather than no-op'ing on the shared URL (#329).

name: dir-mode-post-merge
on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  contents: read
  pull-requests: write   # the bare-Refs warn step posts a PR comment (#337)

jobs:
  reflect:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (for the resolver helper)
        uses: actions/checkout@v4
      - name: Resolve parent Directive from closing issue bodies
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # actions/checkout (above) makes the resolver helper readable. The
          # resolution — label-aware climb to the first `directive`-labelled
          # ancestor (#335) — lives in a sourced, CI-shellchecked, smoke-tested
          # helper rather than inline run-block bash. Its gh calls still carry
          # --repo so they stay independent of the runner's cwd git context.
          RESOLVER=".github/workflows/resolve_parent_directive.sh"
          if [ -f "$RESOLVER" ]; then
            # shellcheck source=/dev/null
            . "$RESOLVER"
            resolve_parent_directive "$PR_NUM" "$REPO" >> "$GITHUB_OUTPUT" || true
          else
            echo "resolve: helper $RESOLVER not found — skipping reflection (no-op)" >&2
          fi

      - name: Post hook-enforced reflection (idempotent)
        if: steps.resolve.outputs.directive != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DIRECTIVE: ${{ steps.resolve.outputs.directive }}
          EXEC: ${{ steps.resolve.outputs.exec_issue }}
          PR: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          set -euo pipefail
          # Idempotency: skip if a comment containing this PR's URL already exists
          # on the parent Directive. Matches the /reflect Markdown procedure's
          # existing-URL check, so Claude-in-loop and hook-enforced paths dedupe.
          existing=$(gh issue view "$DIRECTIVE" --repo "$REPO" --comments --json comments \
            --jq ".comments[] | select(.body | contains(\"$PR_URL\")) | .url" | head -1)
          if [ -n "$existing" ]; then
            echo "Already reflected: $existing"
            exit 0
          fi
          # Compose comment. The `directive-exec-count` line is the audit
          # record for this event — GitHub's comment surface is the audit
          # surface for hook-enforced emissions (the per-clone .claude/audit/
          # path is not accessible from a workflow runner).
          comment=$(cat <<COMMENT
          ## Reflection from PR #${PR} (resolved by hook-enforced post-merge workflow)
          <!-- reflect-stub pr=#${PR} -->

          **PR**: [${PR_TITLE}](${PR_URL}) — merged ${MERGED_AT}
          **Linked Execution Issue**: #${EXEC} (auto-closed)
          **Parent Directive**: #${DIRECTIVE}

          ### Audit
          \`directive-exec-count merged directive=#${DIRECTIVE} pr=#${PR} issue=#${EXEC}\` — recorded by \`.github/workflows/dir-mode-post-merge.yml\` (SPEC §5.7 + §5.15, Directive #61). This workflow posts the floor once (URL-guarded above); a Claude-in-loop \`/reflect\` enriches it in place, keyed on the \`reflect-stub\`/\`reflect-enriched\` markers (SPEC §5.15).

          ### Contribution
          Auto-generated stub — the minimal floor. A Claude-in-loop \`/reflect\` run **edits this comment in place** (via the REST comment-update API, PATCH by comment id) with the per-signal block (Contribution + Success signals advanced + Next), swapping the \`reflect-stub\` marker for \`reflect-enriched\` so it runs exactly once. \`/reflect\` keys on those markers, not the PR URL — so it enriches this stub rather than no-op'ing on the shared URL. Absent a \`/reflect\` run, this stub stands.

          Posted by \`.github/workflows/dir-mode-post-merge.yml\` on \`pull_request.closed\` (merged=true).
          COMMENT
          )
          gh issue comment "$DIRECTIVE" --repo "$REPO" --body "$comment"

      - name: Detect bare-Refs §10.5 violation (directive work to default, empty closing set)
        id: bareref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # actions/checkout (above) makes the detector helper readable. It flags a
          # PR merged to the live default branch with an empty closing set but a
          # directive-scoped `Refs #N` (#337, SPEC §10.5) — the #92 leak. Fail-soft;
          # gh calls inside carry --repo.
          DETECTOR=".github/workflows/detect_bare_refs_directive.sh"
          if [ -f "$DETECTOR" ]; then
            # shellcheck source=/dev/null
            . "$DETECTOR"
            detect_bare_refs_directive "$PR_NUM" "$REPO" >> "$GITHUB_OUTPUT" || true
          else
            echo "bareref: detector $DETECTOR not found — skipping (no-op)" >&2
          fi

      - name: Post bare-Refs §10.5 warning on the PR (idempotent)
        if: steps.bareref.outputs.flag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          FLAG: ${{ steps.bareref.outputs.flag }}
        run: |
          set -euo pipefail
          # Idempotency: skip if the bare-refs-warning marker for this PR already
          # exists among the PR's comments (mirrors the reflection URL-guard).
          existing=$(gh pr view "$PR" --repo "$REPO" --json comments \
            --jq ".comments[] | select(.body | contains(\"bare-refs-warning pr=#$PR\")) | .url" | head -1)
          if [ -n "$existing" ]; then
            echo "Already warned: $existing"
            exit 0
          fi
          comment=$(cat <<COMMENT
          ## SPEC §10.5: directive work merged to the default branch with no closing Execution Issue
          <!-- bare-refs-warning pr=#${PR} -->

          This PR merged to the default branch carrying directive-scoped \`Refs #${FLAG}\` but an **empty closing set** (no \`Closes #N\`), so no Execution Issue closed and the dir-mode post-merge reflection chain did not fire — the parent Directive received no progress record (SPEC §10.5).

          Recovery: re-open the relevant Execution Issue and land a follow-up that \`Closes\` it, or run \`/reflect ${PR}\` to post the reflection manually.

          Posted by \`.github/workflows/dir-mode-post-merge.yml\` (#337) on \`pull_request.closed\` (merged=true).
          COMMENT
          )
          gh pr comment "$PR" --repo "$REPO" --body "$comment"
